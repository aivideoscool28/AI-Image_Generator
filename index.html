<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Image Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a;
      --card: #111111;
      --border: #222;
      --accent: #e8ff47;
      --text: #f0f0f0;
      --muted: #666;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }
    .header { text-align: center; margin-bottom: 48px; }
    .header h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(2rem, 6vw, 4rem);
      letter-spacing: -2px;
      line-height: 1;
    }
    .header h1 span { color: var(--accent); }
    .header p { color: var(--muted); margin-top: 12px; font-size: 1rem; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 600px;
    }
    .input-row { display: flex; gap: 10px; flex-wrap: wrap; }
    input[type="text"] {
      flex: 1;
      min-width: 0;
      background: #1a1a1a;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus { border-color: var(--accent); }
    input[type="text"]::placeholder { color: var(--muted); }
    button {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 10px;
      padding: 14px 24px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }
    button:hover { opacity: 0.85; }
    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .status {
      margin-top: 20px;
      padding: 12px 16px;
      background: #1a1a1a;
      border-radius: 10px;
      font-size: 0.9rem;
      color: var(--muted);
      min-height: 44px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .status.active { color: var(--accent); }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 1s infinite;
      flex-shrink: 0;
      display: none;
    }
    .status.active .dot { display: block; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }
    .image-box {
      margin-top: 24px;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
      display: none;
      background: #111;
    }
    .image-box canvas { width: 100%; display: block; }
    .download-btn {
      display: none;
      width: 100%;
      margin-top: 12px;
      background: #1a1a1a;
      color: var(--text);
      border: 1px solid var(--border);
    }
    .download-btn:hover { background: #222; opacity: 1; }
    .badge {
      display: inline-block;
      background: #1a1a1a;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 4px 12px;
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>AI Image <span>Studio</span></h1>
    <p>Free forever. No sign up. Runs in your browser.</p>
    <span class="badge">⚡ Powered by Stable Diffusion</span>
  </div>
  <div class="card">
    <div class="input-row">
      <input type="text" id="prompt" placeholder="A dragon flying over Tokyo at sunset..." />
      <button id="btn" onclick="generateImage()">Generate</button>
    </div>
    <div class="status" id="status">
      <div class="dot"></div>
      <span id="statusText">Loading AI model... first time takes about 1–2 minutes.</span>
    </div>
    <div class="image-box" id="imageBox">
      <canvas id="canvas"></canvas>
    </div>
    <button class="download-btn" id="downloadBtn" onclick="downloadImage()">
      ⬇ Download Image
    </button>
  </div>
  <script type="module">
    import { pipeline } from
      'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1';
    let generator = null;
    const statusEl = document.getElementById('status');
    const statusText = document.getElementById('statusText');
    const btn = document.getElementById('btn');
    const imageBox = document.getElementById('imageBox');
    const downloadBtn = document.getElementById('downloadBtn');
    function setStatus(msg, active = false) {
      statusText.innerText = msg;
      statusEl.className = 'status' + (active ? ' active' : '');
    }
    async function loadModel() {
      statusEl.classList.add('active');
      try {
        generator = await pipeline('text-to-image', 'Xenova/stable-diffusion-v1-5');
        setStatus('✅ Model ready! Type a prompt and tap Generate.');
      } catch (e) {
        setStatus('❌ Failed to load model: ' + e.message);
      }
    }
    window.generateImage = async function () {
      if (!generator) { setStatus('Still loading, please wait...', true); return; }
      const prompt = document.getElementById('prompt').value.trim();
      if (!prompt) { alert('Please type a prompt first!'); return; }
      btn.disabled = true;
      imageBox.style.display = 'none';
      downloadBtn.style.display = 'none';
      setStatus('Generating your image... 30–90 seconds ⏳', true);
      try {
        const result = await generator(prompt);
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = result.width;
        canvas.height = result.height;
        ctx.putImageData(result, 0, 0);
        imageBox.style.display = 'block';
        downloadBtn.style.display = 'block';
        setStatus('✅ Done! Generate another one anytime.');
      } catch (e) {
        setStatus('❌ Error: ' + e.message);
      }
      btn.disabled = false;
    };
    window.downloadImage = function () {
      const canvas = document.getElementById('canvas');
      const link = document.createElement('a');
      link.download = 'ai-image.png';
      link.href = canvas.toDataURL();
      link.click();
    };
    loadModel();
  </script>
</body>
</html>
